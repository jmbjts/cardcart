name: Card Scrape (manual trigger only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: |
          python yuyu_scraper.py --out yuyu_cards_new.csv --exact-names names_exact.csv --names names.csv $(cat yyt.txt | tr -d '\r' | tr '\n' ' ')

      - name: Validate and replace CSV
        run: |
          CSV_UPDATED=false
          if [ -f yuyu_cards_new.csv ]; then
            LINES=$(wc -l < yuyu_cards_new.csv)
            if [ "$LINES" -gt 1 ]; then
              mv yuyu_cards_new.csv yuyu_cards_latest.csv
              CSV_UPDATED=true
              echo "Scrape succeeded: $LINES lines"
            else
              echo "No data - keeping existing CSV"
              rm -f yuyu_cards_new.csv
            fi
          fi
          echo "CSV_UPDATED=$CSV_UPDATED" >> $GITHUB_ENV

      - name: Write metadata
        run: |
          if [ "$CSV_UPDATED" = "true" ] && [ -f yuyu_cards_latest.csv ]; then
            COUNT=$(tail -n +2 yuyu_cards_latest.csv | wc -l)
            echo "{\"updated\":\"$(date -u +%Y-%m-%d)\",\"time\":\"$(date -u +%H:%M) UTC\",\"count\":$COUNT}" > meta.json
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meta.json names.csv names_exact.csv
          [ -f yuyu_cards_latest.csv ] && git add yuyu_cards_latest.csv || true
          git diff --staged --quiet || git commit -m "data: update cards $(date -u +%Y-%m-%d)"
          git push
